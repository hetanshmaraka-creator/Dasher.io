<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Geometry Dash Full Engine Pro</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
canvas{
    background:#222;
    border:3px solid white;
}
</style>
</head>
<body>

<h2>Geometry Dash Engine PRO</h2>

<div>
State: <span id="stateText">menu</span> |
Mode: <span id="modeText">cube</span> |
Editor: <span id="editorText">off</span> |
Score: <span id="score">0</span>
</div>

<canvas id="game" width="900" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ================= STATE =================
let state = "menu";
let editor = false;

// ================= PLAYER =================
const player = {
    x:100,
    y:300,
    w:40,
    h:40,
    dy:0
};

// ================= GAME =================
let mode = "cube";
let speed = 7;
let gravity = 0.8;

let obstacles = [];
let customLevel = JSON.parse(localStorage.getItem("level")) || [];

let score = 0;

// ================= MUSIC SYNC (FAKE BEAT SYSTEM) =================
let beat = false;

setInterval(()=>{
    beat = true;
    setTimeout(()=>beat=false,100);
},500);

// ================= INPUT =================
let holding = false;

document.addEventListener("keydown",e=>{

    // MENU START
    if(state === "menu"){
        if(e.code==="Space"){
            state = "play";
            document.getElementById("stateText").textContent = "play";
        }
        return;
    }

    if(e.code==="Space") holding = true;

    if(e.code==="KeyE"){
        editor = !editor;
        document.getElementById("editorText").textContent = editor ? "on" : "off";
    }

    if(e.code==="KeyS"){
        localStorage.setItem("level", JSON.stringify(customLevel));
        alert("Level Saved!");
    }

    if(e.code==="KeyL"){
        customLevel = JSON.parse(localStorage.getItem("level") || "[]");
        alert("Level Loaded!");
    }

    if(e.code==="Digit1") setMode("cube");
    if(e.code==="Digit2") setMode("ufo");
    if(e.code==="Digit3") setMode("ship");
    if(e.code==="Digit4") setMode("wave");
    if(e.code==="Digit5") setMode("robot");
});

document.addEventListener("keyup",e=>{
    if(e.code==="Space") holding = false;
});

canvas.addEventListener("click",(e)=>{

    if(state === "menu"){
        state = "play";
        document.getElementById("stateText").textContent = "play";
        return;
    }

    if(editor){
        const r = canvas.getBoundingClientRect();
        let x = e.clientX - r.left;
        let y = e.clientY - r.top;

        customLevel.push({x,y,w:40,h:40});
    }

    holding = true;
});

// ================= MODE =================
function setMode(m){
    mode = m;
    document.getElementById("modeText").textContent = m;
}

// ================= SPAWN =================
setInterval(()=>{
    if(state !== "play") return;

    obstacles.push({x:900,y:320,w:40,h:40});
},1200);

// ================= COLLISION =================
function hit(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

// ================= LOOP =================
function loop(){

    ctx.clearRect(0,0,900,400);

    // ================= MENU =================
    if(state === "menu"){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GEOMETRY DASH ENGINE PRO",150,140);

        ctx.font="20px Arial";
        ctx.fillText("Press SPACE or CLICK to Start",240,200);

        ctx.fillText("E = Editor | S = Save | L = Load",220,250);

        requestAnimationFrame(loop);
        return;
    }

    // ================= BEAT EFFECT =================
    ctx.fillStyle = beat ? "#0f0" : "lime";
    ctx.fillRect(0,360,900,40);

    // ================= PHYSICS =================
    if(mode === "cube") player.dy += gravity;
    if(mode === "ufo") player.dy += 0.4;
    if(mode === "ship") player.dy += holding ? -0.6 : 0.6;
    if(mode === "wave") player.dy = holding ? -6 : 6;
    if(mode === "robot"){
        if(holding && player.dy === 0) player.dy = -18;
        player.dy += gravity;
    }

    player.y += player.dy;

    if(player.y > 320){ player.y = 320; player.dy = 0; }
    if(player.y < 0){ player.y = 0; player.dy = 0; }

    // ================= PLAYER =================
    ctx.fillStyle = beat ? "yellow" : "cyan";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // ================= OBSTACLES =================
    for(let i=obstacles.length-1;i>=0;i--){
        let o = obstacles[i];
        o.x -= speed;

        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.moveTo(o.x,o.y+40);
        ctx.lineTo(o.x+20,o.y);
        ctx.lineTo(o.x+40,o.y+40);
        ctx.fill();

        if(hit(player,o)){
            alert("Game Over! Score: " + score);
            location.reload();
        }

        if(o.x < -60) obstacles.splice(i,1);
    }

    // ================= CUSTOM LEVEL =================
    for(let b of customLevel){
        ctx.fillStyle="purple";
        ctx.fillRect(b.x,b.y,b.w,b.h);

        if(hit(player,b)){
            alert("Hit custom block!");
            location.reload();
        }

        b.x -= speed;
    }

    // ================= SCORE =================
    score++;
    document.getElementById("score").textContent = Math.floor(score/10);

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
