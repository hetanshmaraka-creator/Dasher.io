<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Geometry Dash</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    margin:auto;
    border:3px solid white;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>

<canvas id="game" width="900" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");

const player = {
    x:120,
    y:300,
    w:40,
    h:40,
    dy:0,
    rotation:0
};

let obstacles = [];
let score = 0;
let gameOver = false;

const gravity = 0.7;
const jumpPower = -12;
const speed = 6;

// Jump
document.addEventListener("keydown", e => {

    if(e.code === "Space"){
        e.preventDefault();

        if(gameOver){
            reset();
            return;
        }

        if(player.y >= 300){
            player.dy = jumpPower;
        }
    }
});

function reset(){
    obstacles = [];
    score = 0;
    gameOver = false;

    player.y = 300;
    player.dy = 0;
    player.rotation = 0;
}

// Spike patterns
setInterval(() => {

    if(gameOver) return;

    const pattern = Math.floor(Math.random() * 5);

    switch(pattern){

        case 0:
            obstacles.push({x:900,y:320,w:40,h:40});
            break;

        case 1:
            obstacles.push({x:900,y:320,w:40,h:40});
            obstacles.push({x:940,y:320,w:40,h:40});
            break;

        case 2:
            obstacles.push({x:900,y:320,w:40,h:40});
            obstacles.push({x:940,y:320,w:40,h:40});
            obstacles.push({x:980,y:320,w:40,h:40});
            break;

        case 3:
            obstacles.push({x:900,y:320,w:40,h:40});
            obstacles.push({x:1040,y:320,w:40,h:40});
            break;

        case 4:
            obstacles.push({x:900,y:320,w:40,h:40});
            obstacles.push({x:980,y:320,w:40,h:40});
            obstacles.push({x:1060,y:320,w:40,h:40});
            break;
    }

},1400);

function collision(a,b){
    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

function drawSpike(x,y){

    ctx.fillStyle = "#ff3333";

    ctx.beginPath();
    ctx.moveTo(x,y+40);
    ctx.lineTo(x+20,y);
    ctx.lineTo(x+40,y+40);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawBackground(){

    // Sky
    const sky = ctx.createLinearGradient(0,0,0,400);
    sky.addColorStop(0,"#0d1b5e");
    sky.addColorStop(1,"#4a148c");

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,900,400);

    // Stars
    ctx.fillStyle = "white";

    for(let i=0;i<60;i++){

        const x = (i*173 + score*0.2) % 900;
        const y = (i*41) % 220;

        ctx.fillRect(x,y,2,2);
    }

    // Mountains
    ctx.fillStyle = "#1b1464";

    for(let i=0;i<8;i++){

        const x = (i*180) - ((score*0.8)%180);

        ctx.beginPath();
        ctx.moveTo(x,340);
        ctx.lineTo(x+90,180);
        ctx.lineTo(x+180,340);
        ctx.fill();
    }

    // Decorative squares
    ctx.fillStyle = "rgba(255,255,255,0.08)";

    for(let i=0;i<20;i++){

        const x = (i*120) - ((score*1.5)%120);

        ctx.fillRect(x,100,60,60);
    }

    // Ground
    ctx.fillStyle = "#333";
    ctx.fillRect(0,340,900,60);

    ctx.strokeStyle = "#888";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(0,340);
    ctx.lineTo(900,340);
    ctx.stroke();
}

function loop(){

    ctx.clearRect(0,0,900,400);

    drawBackground();

    if(!gameOver){

        player.dy += gravity;
        player.y += player.dy;

        if(player.y > 300){
            player.y = 300;
            player.dy = 0;
        }

        if(player.y < 300){
            player.rotation += 0.15;
        }

        score += 0.1;
    }

    // Draw cube
    ctx.save();

    ctx.translate(
        player.x + player.w/2,
        player.y + player.h/2
    );

    ctx.rotate(player.rotation);

    ctx.fillStyle = "#00ffff";
    ctx.fillRect(-20,-20,40,40);

    ctx.strokeStyle = "black";
    ctx.strokeRect(-20,-20,40,40);

    ctx.restore();

    // Obstacles
    for(let i=obstacles.length-1;i>=0;i--){

        const o = obstacles[i];

        if(!gameOver){
            o.x -= speed;
        }

        drawSpike(o.x,o.y);

        if(collision(player,o)){
            gameOver = true;
        }

        if(o.x < -60){
            obstacles.splice(i,1);
        }
    }

    scoreText.textContent =
        "Score: " + Math.floor(score);

    if(gameOver){

        ctx.fillStyle = "white";
        ctx.font = "48px Arial";
        ctx.fillText("GAME OVER",250,150);

        ctx.font = "24px Arial";
        ctx.fillText(
            "Press SPACE to Restart",
            260,
            200
        );
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
