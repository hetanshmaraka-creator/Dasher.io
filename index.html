<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Geometry Dash - Designed Skins</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
canvas{
    background:#222;
    border:3px solid white;
}
button{
    padding:10px;
    margin:5px;
}
</style>
</head>
<body>

<h1>Geometry Dash - Skin Designs</h1>

<div>
Score: <span id="score">0</span>
Level: <span id="level">1</span>
</div>

<br>

<button onclick="setSkin('classic')">Classic Cyan</button>
<button onclick="setSkin('fire')">Fire Cube</button>
<button onclick="setSkin('neon')">Neon Core</button>
<button onclick="setSkin('checker')">Checker Cube</button>

<br><br>

<canvas id="game" width="900" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== PLAYER =====
const player = {
    x:100,
    y:320,
    w:40,
    h:40,
    dy:0,
    gravity:0.8,
    angle:0,
    scaleX:1,
    scaleY:1,
    onGround:false
};

// ===== SKINS (DESIGNS NOT JUST COLORS) =====
const skins = {
    classic:{
        base:"#00ffff",
        pattern:"none"
    },
    fire:{
        base:"#ff3300",
        pattern:"stripes"
    },
    neon:{
        base:"#39ff14",
        pattern:"glow"
    },
    checker:{
        base:"#ffcc00",
        pattern:"checker"
    }
};

let currentSkin = skins.classic;

// ===== TRAIL =====
let trail = [];
const TRAIL_LEN = 10;

// ===== GAME =====
let score = 0;
let level = 1;
let obstacles = [];

// ===== INPUT =====
let jumpBuffer = 0;
let coyoteTime = 0;

function jump(){
    jumpBuffer = 8;
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space") jump();
});
canvas.addEventListener("click",jump);

// ===== SKIN SELECT =====
function setSkin(name){
    currentSkin = skins[name];
}

// ===== OBSTACLES =====
setInterval(()=>{
    obstacles.push({x:900,y:320,w:40,h:40});
},1200);

// ===== COLLISION =====
function hit(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

// ===== TRAIL =====
function addTrail(){
    trail.push({
        x:player.x,
        y:player.y,
        alpha:1
    });

    if(trail.length > TRAIL_LEN){
        trail.shift();
    }
}

// ===== DRAW SKIN DESIGN =====
function drawSkin(x,y,w,h,skin,alpha=1){

    ctx.save();
    ctx.globalAlpha = alpha;

    // base cube
    ctx.fillStyle = skin.base;
    ctx.fillRect(x,y,w,h);

    // patterns
    if(skin.pattern === "stripes"){
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        for(let i=0;i<4;i++){
            ctx.fillRect(x + i*(w/4), y, w/8, h);
        }
    }

    if(skin.pattern === "checker"){
        for(let i=0;i<4;i++){
            for(let j=0;j<4;j++){
                if((i+j)%2==0){
                    ctx.fillStyle = "rgba(0,0,0,0.25)";
                    ctx.fillRect(x+i*(w/4), y+j*(h/4), w/4, h/4);
                }
            }
        }
    }

    if(skin.pattern === "glow"){
        ctx.shadowColor = skin.base;
        ctx.shadowBlur = 15;
        ctx.fillStyle = skin.base;
        ctx.fillRect(x,y,w,h);
    }

    ctx.restore();
}

// ===== GAME OVER =====
function gameOver(){
    alert("Game Over! Score: " + Math.floor(score/10));
    location.reload();
}

// ===== LOOP =====
function loop(){

    ctx.clearRect(0,0,900,400);

    // ground
    ctx.fillStyle="lime";
    ctx.fillRect(0,360,900,40);

    // physics
    player.dy += player.gravity;
    player.y += player.dy;

    if(player.y >= 320){
        player.y = 320;
        player.dy = 0;
        player.onGround = true;
        coyoteTime = 6;
    } else {
        player.onGround = false;
        coyoteTime--;
    }

    if(jumpBuffer > 0) jumpBuffer--;

    if(jumpBuffer > 0 && coyoteTime > 0){
        player.dy = -15;
        jumpBuffer = 0;
        coyoteTime = 0;
    }

    // trail update
    addTrail();

    // draw trail
    for(let i=0;i<trail.length;i++){
        let t = trail[i];
        t.alpha -= 0.1;

        drawSkin(t.x,t.y,player.w,player.h,currentSkin,t.alpha);
    }

    // animation
    player.angle += player.dy * 0.02;
    if(player.onGround) player.angle *= 0.7;

    player.scaleX += (1 - player.scaleX)*0.2;
    player.scaleY += (1 - player.scaleY)*0.2;

    // player draw
    ctx.save();
    ctx.translate(player.x+20,player.y+20);
    ctx.rotate(player.angle);
    ctx.scale(player.scaleX,player.scaleY);

    drawSkin(-20,-20,40,40,currentSkin,1);

    ctx.restore();

    // obstacles
    for(let i=obstacles.length-1;i>=0;i--){
        let o = obstacles[i];
        o.x -= 7;

        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.moveTo(o.x,o.y+40);
        ctx.lineTo(o.x+20,o.y);
        ctx.lineTo(o.x+40,o.y+40);
        ctx.fill();

        if(hit(player,o)){
            gameOver();
            return;
        }

        if(o.x < -50) obstacles.splice(i,1);
    }

    // score
    score++;
    document.getElementById("score").textContent = Math.floor(score/10);

    level = 1 + Math.floor(score/300);
    document.getElementById("level").textContent = level;

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
