<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini Geometry Dash</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    margin:auto;
    border:3px solid white;
    width:100vw;
    height:50vh;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");

let player = {
    x:120,
    y:300,
    w:40,
    h:40,
    dy:0,
    rotation:0
};

let gravity = 0.7;
let jumpPower = -12;
let speed = 6;

let obstacles = [];
let score = 0;
let gameOver = false;

let spaceDown = false;
let jumpPressed = false;

// ================= RESIZE FOR MOBILE =================
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.5;
}
window.addEventListener("resize", resize);
resize();

// ================= RESET =================
function reset(){
    player.y = 300;
    player.dy = 0;
    player.rotation = 0;

    obstacles = [];
    score = 0;
    gameOver = false;
}

// ================= INPUT (PC) =================
document.addEventListener("keydown", e => {
    if(e.code === "Space"){
        e.preventDefault();
        if(!spaceDown) jumpPressed = true;
        spaceDown = true;

        if(gameOver) reset();
    }
});

document.addEventListener("keyup", e => {
    if(e.code === "Space"){
        spaceDown = false;
    }
});

// ================= INPUT (MOBILE) =================
document.addEventListener("touchstart", e => {
    e.preventDefault();

    if(!spaceDown) jumpPressed = true;
    spaceDown = true;

    if(gameOver) reset();
});

document.addEventListener("touchend", () => {
    spaceDown = false;
});

// ================= SPIKE PATTERNS =================
setInterval(() => {
    if(gameOver) return;

    let pattern = Math.floor(Math.random()*5);

    if(pattern === 0){
        obstacles.push({x:900,y:320,w:40,h:40});
    }
    else if(pattern === 1){
        obstacles.push({x:900,y:320,w:40,h:40});
        obstacles.push({x:940,y:320,w:40,h:40});
    }
    else if(pattern === 2){
        obstacles.push({x:900,y:320,w:40,h:40});
        obstacles.push({x:940,y:320,w:40,h:40});
        obstacles.push({x:980,y:320,w:40,h:40});
    }
    else if(pattern === 3){
        obstacles.push({x:900,y:320,w:40,h:40});
        obstacles.push({x:1040,y:320,w:40,h:40});
    }
    else{
        obstacles.push({x:900,y:320,w:40,h:40});
        obstacles.push({x:980,y:320,w:40,h:40});
        obstacles.push({x:1060,y:320,w:40,h:40});
    }

},1200);

// ================= COLLISION =================
function collision(a,b){
    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

// ================= SPIKE DRAW =================
function drawSpike(x,y){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(x,y+40);
    ctx.lineTo(x+20,y);
    ctx.lineTo(x+40,y+40);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle="white";
    ctx.lineWidth=2;
    ctx.stroke();
}

// ================= LOOP =================
function loop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background
    let sky = ctx.createLinearGradient(0,0,0,canvas.height);
    sky.addColorStop(0,"#0d1b5e");
    sky.addColorStop(1,"#4a148c");
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // ground
    ctx.fillStyle="#333";
    ctx.fillRect(0,canvas.height-60,canvas.width,60);

    if(!gameOver){

        player.dy += gravity;
        player.y += player.dy;

        if(player.y > 300){
            player.y = 300;
            player.dy = 0;
        }

        if(player.y < 300){
            player.rotation += 0.15;
        }

        score += 0.1;
    }

    // player
    ctx.save();
    ctx.translate(player.x+20, player.y+20);
    ctx.rotate(player.rotation);

    ctx.fillStyle="cyan";
    ctx.fillRect(-20,-20,40,40);

    ctx.strokeStyle="black";
    ctx.strokeRect(-20,-20,40,40);

    ctx.restore();

    // obstacles
    for(let i=obstacles.length-1;i>=0;i--){

        let o = obstacles[i];

        if(!gameOver){
            o.x -= speed;
        }

        drawSpike(o.x,o.y);

        if(collision(player,o)){
            gameOver = true;
        }

        if(o.x < -60){
            obstacles.splice(i,1);
        }
    }

    scoreText.innerText = "Score: " + Math.floor(score);

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",canvas.width/2 - 120,150);

        ctx.font="20px Arial";
        ctx.fillText("Tap or Press SPACE to restart",canvas.width/2 - 160,190);
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
