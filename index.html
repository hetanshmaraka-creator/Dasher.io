<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Mini Geometry Dash UFO Edition</title>
<style>
body{margin:0;overflow:hidden;background:#111;font-family:Arial}
canvas{display:block}
#score{position:absolute;top:10px;left:10px;color:white;font-size:24px;font-weight:bold}
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreText=document.getElementById("score");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
addEventListener("resize",resize); resize();

const player={x:120,y:0,w:40,h:40,dy:0,rot:0};
let gravity=0.7,jumpPower=-14,speed=7;
let obstacles=[],portals=[],walls=[];
let score=0,gameOver=false,jumpPressed=false,spaceDown=false,ufoMode=false,touchingWall=false;

const groundY=()=>canvas.height-100;
player.y=groundY();

function reset(){
 player.y=groundY(); player.dy=0; player.rot=0;
 obstacles=[]; portals=[]; walls=[];
 score=0; gameOver=false; ufoMode=false;
}

function collision(a,b){
 return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

document.addEventListener("keydown",e=>{
 if(e.code==="Space"){
  e.preventDefault();
  if(!spaceDown) jumpPressed=true;
  spaceDown=true;
  if(gameOver) reset();
 }
});
document.addEventListener("keyup",e=>{
 if(e.code==="Space") spaceDown=false;
});
document.addEventListener("touchstart",e=>{
 e.preventDefault();
 if(!spaceDown) jumpPressed=true;
 spaceDown=true;
 if(gameOver) reset();
},{passive:false});
document.addEventListener("touchend",()=>spaceDown=false);

function spawnSpikes(){
 let base=canvas.width+50;
 let p=Math.floor(Math.random()*4);
 if(p===0){
  obstacles.push({x:base,y:groundY(),w:40,h:40});
  obstacles.push({x:base+25,y:groundY(),w:40,h:40});
 }
 else if(p===1){
  obstacles.push({x:base,y:groundY(),w:40,h:40});
  obstacles.push({x:base+25,y:groundY(),w:40,h:40});
  obstacles.push({x:base+50,y:groundY(),w:40,h:40});
 }
 else if(p===2){
  obstacles.push({x:base,y:groundY(),w:40,h:40});
  obstacles.push({x:base+60,y:groundY(),w:40,h:40});
  obstacles.push({x:base+85,y:groundY(),w:40,h:40});
 }
 else {
  obstacles.push({x:base,y:groundY(),w:40,h:40});
 }
}
setInterval(()=>{if(!gameOver)spawnSpikes();},900);
setInterval(()=>{
 if(!gameOver) portals.push({x:canvas.width+200,y:groundY()-80,w:50,h:80});
},8000);
setInterval(()=>{
 if(!gameOver) walls.push({x:canvas.width+300,y:canvas.height-260,w:40,h:160});
},5000);

function drawSpike(x,y){
 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.moveTo(x,y+40);
 ctx.lineTo(x+20,y);
 ctx.lineTo(x+40,y+40);
 ctx.closePath();
 ctx.fill();
}

function loop(){
 requestAnimationFrame(loop);

 let sky=ctx.createLinearGradient(0,0,0,canvas.height);
 sky.addColorStop(0,"#0d1b5e");
 sky.addColorStop(1,"#4a148c");
 ctx.fillStyle=sky;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#333";
 ctx.fillRect(0,canvas.height-60,canvas.width,60);

 touchingWall=false;

 if(!gameOver){
  player.dy+=gravity;
  player.y+=player.dy;

  if(player.y>groundY()){
   player.y=groundY();
   player.dy=0;
  }

  for(const w of walls){
   if(collision(player,w) && player.x+player.w<=w.x+25){
      touchingWall=true;
      player.dy=Math.min(player.dy,3);
   }
  }

  if(jumpPressed){
   if(player.y>=groundY()) player.dy=jumpPower;
   else if(ufoMode) player.dy=-10;
   else if(touchingWall) player.dy=jumpPower;
  }
  jumpPressed=false;

  if(player.y<groundY()) player.rot+=0.15;
  score+=0.1;
 }

 for(let i=walls.length-1;i>=0;i--){
  walls[i].x-=gameOver?0:speed;
  ctx.fillStyle="#00ff88";
  ctx.fillRect(walls[i].x,walls[i].y,walls[i].w,walls[i].h);
  if(walls[i].x<-100) walls.splice(i,1);
 }

 for(let i=portals.length-1;i>=0;i--){
  let p=portals[i];
  p.x-=gameOver?0:speed;
  ctx.strokeStyle="#ff00ff";
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.arc(p.x+25,p.y+40,25,0,Math.PI*2);
  ctx.stroke();
  if(collision(player,p)){
    ufoMode=!ufoMode;
    portals.splice(i,1);
    continue;
  }
  if(p.x<-100) portals.splice(i,1);
 }

 ctx.save();
 ctx.translate(player.x+20,player.y+20);
 ctx.rotate(player.rot);
 ctx.fillStyle=ufoMode?"yellow":"cyan";
 ctx.fillRect(-20,-20,40,40);
 ctx.restore();

 for(let i=obstacles.length-1;i>=0;i--){
  let o=obstacles[i];
  o.x-=gameOver?0:speed;
  drawSpike(o.x,o.y);
  if(collision(player,o)) gameOver=true;
  if(o.x<-100) obstacles.splice(i,1);
 }

 scoreText.textContent="Score: "+Math.floor(score);

 if(gameOver){
  ctx.fillStyle="white";
  ctx.font="48px Arial";
  ctx.fillText("GAME OVER",canvas.width/2-160,180);
  ctx.font="24px Arial";
  ctx.fillText("Press SPACE or TAP",canvas.width/2-110,220);
 }
}
loop();
</script>
</body>
</html>
