<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Geometry Dash Engine PRO FIXED</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
canvas{
    background:#222;
    border:3px solid white;
}
</style>
</head>
<body>

<h2>Geometry Dash Engine PRO (FIXED)</h2>

<div>
State: <span id="stateText">menu</span> |
Mode: <span id="modeText">cube</span> |
Editor: <span id="editorText">off</span> |
Score: <span id="score">0</span>
</div>

<canvas id="game" width="900" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ================= STATE =================
let state = "menu";
let editor = false;
let holding = false;
let jumpBuffer = 0;

// ================= PLAYER =================
const player = {
    x:100,
    y:300,
    w:40,
    h:40,
    dy:0
};

// ================= GAME =================
let mode = "cube";
let gravity = 0.7;
let speed = 6;

let obstacles = [];
let customLevel = JSON.parse(localStorage.getItem("level")) || [];

let score = 0;

// ================= BEAT =================
let beat = false;
setInterval(()=>{
    beat = true;
    setTimeout(()=>beat=false,100);
},500);

// ================= INPUT =================
document.addEventListener("keydown",e=>{
    if(state === "menu" && e.code === "Space"){
        state = "play";
        document.getElementById("stateText").textContent = "play";
    }

    if(e.code==="Space"){
        holding = true;
        jumpBuffer = 6;
    }

    if(e.code==="KeyE"){
        editor = !editor;
        document.getElementById("editorText").textContent = editor ? "on":"off";
    }

    if(e.code==="KeyS"){
        localStorage.setItem("level", JSON.stringify(customLevel));
        alert("Saved!");
    }

    if(e.code==="KeyL"){
        customLevel = JSON.parse(localStorage.getItem("level") || "[]");
        alert("Loaded!");
    }

    if(e.code==="Digit1") setMode("cube");
    if(e.code==="Digit2") setMode("ufo");
    if(e.code==="Digit3") setMode("ship");
    if(e.code==="Digit4") setMode("wave");
    if(e.code==="Digit5") setMode("robot");
});

document.addEventListener("keyup",e=>{
    if(e.code==="Space") holding = false;
});

canvas.addEventListener("click",(e)=>{
    if(state === "menu"){
        state = "play";
        document.getElementById("stateText").textContent = "play";
        return;
    }

    if(editor){
        const r = canvas.getBoundingClientRect();
        let x = e.clientX - r.left;
        let y = e.clientY - r.top;
        customLevel.push({x,y,w:40,h:40});
    }

    holding = true;
});

// ================= MODE =================
function setMode(m){
    mode = m;
    document.getElementById("modeText").textContent = m;
}

// ================= SPAWN =================
setInterval(()=>{
    if(state !== "play") return;
    obstacles.push({x:900,y:320,w:40,h:40});
},1000);

// ================= COLLISION =================
function hit(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

// ================= RESET =================
function reset(){
    player.y = 300;
    player.dy = 0;
    obstacles = [];
    score = 0;
}

// ================= LOOP =================
function loop(){
    ctx.clearRect(0,0,900,400);

    if(state === "menu"){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GEOMETRY DASH ENGINE PRO",120,140);

        ctx.font="18px Arial";
        ctx.fillText("SPACE / CLICK to Start",260,200);
        ctx.fillText("E Editor | S Save | L Load | 1-5 Modes",180,240);

        requestAnimationFrame(loop);
        return;
    }

    if(jumpBuffer > 0) jumpBuffer--;

    let onGround = player.y >= 320;

    // ================= PHYSICS =================
    player.dy = Math.max(-18, Math.min(18, player.dy));

    if(mode === "cube"){
        if(onGround && jumpBuffer > 0){
            player.dy = -12;
            jumpBuffer = 0;
        }
        player.dy += gravity;
    }

    if(mode === "ufo"){
        if(holding) player.dy -= 0.8;
        else player.dy += 0.6;
    }

    if(mode === "ship"){
        if(holding) player.dy -= 0.6;
        else player.dy += 0.4;
        player.dy *= 0.98;
    }

    if(mode === "wave"){
        player.dy = holding ? -6 : 6;
        player.y += player.dy;
        player.dy = 0;
    }

    if(mode === "robot"){
        if(onGround && jumpBuffer > 0){
            player.dy = -16;
            jumpBuffer = 0;
        }
        player.dy += gravity;
    }

    if(mode !== "wave"){
        player.y += player.dy;
    }

    if(player.y > 320){ player.y = 320; player.dy = 0; }
    if(player.y < 0){ player.y = 0; player.dy = 0; }

    // ================= PLAYER =================
    ctx.fillStyle = beat ? "yellow" : "cyan";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // ================= OBSTACLES =================
    for(let i=obstacles.length-1;i>=0;i--){
        let o = obstacles[i];
        o.x -= speed;

        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.moveTo(o.x,o.y+40);
        ctx.lineTo(o.x+20,o.y);
        ctx.lineTo(o.x+40,o.y+40);
        ctx.fill();

        if(hit(player,o)){
            reset();
            state = "menu";
        }

        if(o.x < -60) obstacles.splice(i,1);
    }

    // ================= CUSTOM LEVEL =================
    for(let b of customLevel){
        ctx.fillStyle="purple";
        ctx.fillRect(b.x,b.y,b.w,b.h);

        if(state === "play"){
            b.x -= speed;
        }

        if(hit(player,b)){
            reset();
            state = "menu";
        }
    }

    // ================= SCORE =================
    score += 0.1;
    document.getElementById("score").textContent = Math.floor(score);

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
